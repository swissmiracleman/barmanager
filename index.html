                        await setDoc(doc(db, 'bar_inventory', editingItem.id), { ...itemData, lastUpdated: serverTimestamp() }, { merge: true });
                        addToLog(actionType, `Artikel bearbeitet: ${itemData.name}`);
                    } else {
                        const newId = Date.now().toString(36) + Math.random().toString(36).substr(2);
                        await setDoc(doc(db, 'bar_inventory', newId), { ...itemData, lastUpdated: serverTimestamp() });
                        addToLog(actionType, `Neuer Artikel: ${itemData.name}`);
                    }
                    setModalOpen(false);
                    setEditingItem(null);
                    setActiveScanResult(null);
                } catch (e) { alert("Speichern fehlgeschlagen."); }
            };

            const deleteItem = async (id, name) => {
                if(!window.fb) return;
                const { db, doc, deleteDoc } = window.fb;
                if(confirm('Löschen?')) {
                    await deleteDoc(doc(db, 'bar_inventory', id));
                    addToLog('DELETE', `Artikel gelöscht: ${name}`);
                }
            };

            const addCategory = async (label) => {
                if(!window.fb || !label) return;
                const { db, doc, setDoc } = window.fb;
                const id = label.toLowerCase().trim().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
                await setDoc(doc(db, 'bar_categories', id), { label: label });
                addToLog('CONFIG', `Kategorie erstellt: ${label}`);
            };
            const deleteCategory = async (id) => {
                if(!window.fb) return;
                const { db, doc, deleteDoc } = window.fb;
                if(confirm('Kategorie wirklich löschen?')) { try { await deleteDoc(doc(db, 'bar_categories', id)); } catch(e) {} }
            };
            const addSupplier = async (label) => {
                if(!window.fb || !label) return;
                const { db, doc, setDoc } = window.fb;
                const id = label.toLowerCase().trim().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
                await setDoc(doc(db, 'bar_suppliers', id), { label: label });
                addToLog('CONFIG', `Lieferant erstellt: ${label}`);
            };
            const deleteSupplier = async (id) => {
                if(!window.fb) return;
                const { db, doc, deleteDoc } = window.fb;
                if(confirm('Lieferant wirklich löschen?')) { try { await deleteDoc(doc(db, 'bar_suppliers', id)); } catch(e) {} }
            };
            const resetCategories = async () => {
                if(!window.fb) return;
                const { db, doc, setDoc, writeBatch } = window.fb;
                const batch = writeBatch(db);
                DEFAULT_CATS.forEach(cat => { const id = cat.toLowerCase().replace(/[^a-z0-9]/g, '_'); batch.set(doc(db, 'bar_categories', id), { label: cat }); });
                await batch.commit();
                alert("Standard-Kategorien wiederhergestellt.");
            };
            
            const exportCSV = () => {
                const headers = ["Name", "Kategorie", "Lieferant", "Bestand", "Min. Bestand", "Inhalt (cl)", "Preis (CHF)", "Barcode", "Karton Barcode", "Fl. pro Karton", "Info"];
                const rows = inventory.map(i => [
                    `"${i.name.replace(/"/g, '""')}"`, 
                    `"${i.category}"`, 
                    `"${i.supplier || ''}"`, 
                    i.stock, 
                    i.min, 
                    i.size || "", 
                    i.price || "", 
                    `"${i.barcode || ""}"`, 
                    `"${i.boxBarcode || ""}"`, 
                    i.boxQuantity || "", 
                    `"${(i.info || '').replace(/"/g, '""')}"`
                ]);
                const csvContent = [headers.join(";"), ...rows.map(r => r.join(";"))].join("\n");
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `bar_inventur_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const fetchLogsForPeriod = async (p) => {
                if(!window.fb) return;
                const [y, m] = p.split('-').map(Number);
                const s = new Date(y, m - 1, 1);
                const e = new Date(y, m, 0, 23, 59, 59);
                try {
                    const q = window.fb.query(window.fb.collection(window.fb.db, 'bar_logs'), window.fb.where('timestamp', '>=', s), window.fb.where('timestamp', '<=', e), window.fb.orderBy('timestamp', 'desc'));
                    const sn = await window.fb.getDocs(q);
                    const pl = []; sn.forEach(d => pl.push({ id: d.id, ...d.data() }));
                    setLogs(pl);
                } catch (err) {}
            };

            const fetchConsumptionLogs = async (months) => {
                if (!window.fb) return;
                setConsumptionLoading(true);
                try {
                    const now = new Date();
                    const start = new Date(now.getFullYear(), now.getMonth() - months, now.getDate());
                    const q = window.fb.query(
                        window.fb.collection(window.fb.db, 'bar_logs'),
                        window.fb.where('timestamp', '>=', start),
                        window.fb.where('timestamp', '<=', now),
                        window.fb.orderBy('timestamp', 'desc')
                    );
                    const snap = await window.fb.getDocs(q);
                    const results = [];
                    snap.forEach(d => results.push({ id: d.id, ...d.data() }));
                    setConsumptionLogs(results);
                } catch (err) {
                    console.error("Fehler beim Laden der Verbrauchsdaten:", err);
                }
                setConsumptionLoading(false);
            };

            useEffect(() => {
                if (user) fetchConsumptionLogs(consumptionPeriod);
            }, [consumptionPeriod, user]);

            const addManualOrder = async (orderData) => {
                if(!window.fb) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, 'bar_extra_orders'), {
                        ...orderData,
                        timestamp: serverTimestamp()
                    });
                    addToLog('ORDER', `Sonderbestellung: ${orderData.itemName}`, orderData.reason);
                    setManualOrderModalOpen(false);
                } catch (e) { alert("Fehler beim Speichern der Sonderbestellung."); }
            };

            const deleteManualOrder = async (id) => {
                if(!window.fb) return;
                const { db, doc, deleteDoc } = window.fb;
                if(confirm('Bestellung löschen?')) await deleteDoc(doc(db, 'bar_extra_orders', id));
            };

            const toggleOrderItem = (id) => {
                setSelectedOrderItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const updateOrderQuantity = (id, val) => {
                setOrderQuantities(prev => ({ ...prev, [id]: val === '' ? '' : parseInt(val) }));
            };

            const processOrder = async (lowStockItems, extraOrdersList) => {
                if(!window.fb) return;
                const { db, doc, writeBatch, serverTimestamp, increment } = window.fb;
                const batch = writeBatch(db);
                let count = 0;
                const pendingLogs = []; 

                lowStockItems.forEach(item => {
                    if (selectedOrderItems[item.id]) {
                        const currentStock = parseFloat(item.stock) || 0;
                        const minStock = parseFloat(item.min) || 0;
                        const suggestion = Math.ceil((minStock - currentStock) + 2);
                        
                        const qtyValue = orderQuantities[item.id];
                        const qtyToAdd = (qtyValue !== undefined && qtyValue !== '') ? qtyValue : suggestion;
                        
                        batch.update(doc(db, 'bar_inventory', item.id), { 
                            stock: increment(qtyToAdd), 
                            lastUpdated: serverTimestamp() 
                        });
                        
                        pendingLogs.push({ type: 'ORDER', msg: `Bestellt: ${item.name} (+${qtyToAdd})`, det: `Automatischer Nachschub` });
                        count++;
                    }
                });

                extraOrdersList.forEach(order => {
                    if (selectedOrderItems['manual_' + order.id]) {
                        const invItem = inventory.find(i => i.id === order.itemId);
                        if (invItem) {
                            const qtyToAdd = parseInt(order.quantity) || 0;
                            batch.update(doc(db, 'bar_inventory', invItem.id), { 
                                stock: increment(qtyToAdd), 
                                lastUpdated: serverTimestamp() 
                            });
                            pendingLogs.push({ type: 'ORDER', msg: `Bestellt: ${order.itemName} (+${qtyToAdd})`, det: `Sonderbestellung: ${order.reason}` });
                        }
                        batch.delete(doc(db, 'bar_extra_orders', order.id));
                        count++;
                    }
                });

                if (count === 0) return alert("Bitte wählen Sie zuerst Artikel aus.");

                if(confirm(`${count} Positionen als eingetroffen buchen? Bestand wird aktualisiert.`)) {
                    try {
                        await batch.commit(); 
                        pendingLogs.forEach(l => addToLog(l.type, l.msg, l.det));
                        setSelectedOrderItems({});
                        setOrderQuantities({});
                    } catch(e) {}
                }
            };

            const selectAllOrders = (lowStockItems, extraOrdersList) => {
                const newState = {};
                lowStockItems.forEach(i => newState[i.id] = true);
                extraOrdersList.forEach(i => newState['manual_' + i.id] = true);
                setSelectedOrderItems(newState);
            };

            const stats = useMemo(() => {
                let totalBottles = 0, totalValue = 0;
                const lowStockItems = [];
                const catStats = {}; 
                inventory.forEach(i => {
                    const stock = parseFloat(i.stock) || 0; 
                    const min = parseFloat(i.min) || 0; 
                    const price = parseFloat(i.price) || 0;
                    const cat = i.category || 'Sonstiges';
                    totalBottles += stock;
                    totalValue += (stock * price);
                    if (stock < min) lowStockItems.push(i); 
                    if (!catStats[cat]) catStats[cat] = { count: 0, value: 0 };
                    catStats[cat].count += stock;
                    catStats[cat].value += (stock * price);
                });
                return { totalBottles, totalValue, lowStockItems, catStats };
            }, [inventory]);

            const consumptionStats = useMemo(() => {
                const perArticle = {};
                let totalConsumed = 0;

                consumptionLogs.forEach(log => {
                    if (log.type !== 'UPDATE') return;
                    const match = log.message.match(/(.+):\sBestand\s([+-]?\d+(\.\d+)?)/);
                    if (!match) return;
                    const name = match[1];
                    const delta = parseFloat(match[2]);
                    if (delta >= 0) return;

                    const absDelta = Math.abs(delta);
                    if (!perArticle[name]) perArticle[name] = { total: 0, count: 0 };
                    perArticle[name].total += absDelta;
                    perArticle[name].count += 1;
                    totalConsumed += absDelta;
                });

                const months = consumptionPeriod || 1;
                Object.values(perArticle).forEach(v => {
                    v.avgPerMonth = v.total / months;
                });

                const ranked = Object.entries(perArticle)
                    .map(([name, data]) => ({ name, ...data }))
                    .sort((a, b) => b.total - a.total);

                return { perArticle, totalConsumed, avgPerMonth: totalConsumed / months, ranked };
            }, [consumptionLogs, consumptionPeriod]);

            const filtered = useMemo(() => {
                return inventory.filter(i => {
                    const searchMatch = (i.name||'').toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        (i.category||'').toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        (i.barcode||'').includes(searchTerm) ||
                                        (i.boxBarcode||'').includes(searchTerm);
                    if (!searchMatch) return false;
                    if (filters.supplier && i.supplier !== filters.supplier) return false;
                    if (filters.barcode === 'has' && !(i.barcode || i.boxBarcode)) return false;
                    if (filters.barcode === 'missing' && (i.barcode || i.boxBarcode)) return false;
                    if (filters.info === 'has' && !i.info) return false;
                    if (filters.info === 'missing' && i.info) return false;
                    return true;
                }).sort((a, b) => {
                    switch(filters.sort) {
                        case 'price_asc': return (parseFloat(a.price)||0) - (parseFloat(b.price)||0);
                        case 'price_desc': return (parseFloat(b.price)||0) - (parseFloat(a.price)||0);
                        case 'stock_asc': return (parseFloat(a.stock)||0) - (parseFloat(b.stock)||0);
                        case 'stock_desc': return (parseFloat(b.stock)||0) - (parseFloat(a.stock)||0);
                        case 'name_desc': return (b.name||'').localeCompare(a.name||'');
                        default: return (a.name||'').localeCompare(b.name||''); 
                    }
                });
            }, [inventory, searchTerm, filters]);

            const openScanner = (context) => { setScanContext(context); setScannerOpen(true); };
            const openAddModal = () => { setEditingItem(null); setActiveScanResult(null); setModalOpen(true); };
            const openEditModal = (item) => { setEditingItem(item); setActiveScanResult(null); setModalOpen(true); };

            const handleScan = (txt) => {
                setScannerOpen(false);
                
                if (scanContext && scanContext.startsWith('edit_')) {
                    const field = scanContext.split('_')[1]; 
                    setActiveScanResult({ field: field, value: txt });
                } else {
                    const itemSingle = inventory.find(i => i.barcode === txt);
                    const itemBox = inventory.find(i => i.boxBarcode && i.boxBarcode === txt);
                    
                    if (itemBox) {
                        setScanResultData({ item: itemBox, isBox: true });
                    } else if (itemSingle) {
                        setScanResultData({ item: itemSingle, isBox: false });
                    } else {
                        if (scanContext === 'search') {
                            alert("Unbekannter Barcode: " + txt);
                        }
                    }
                }
            };

            const handleScanConsume = (totalToConsume) => {
                if (scanResultData && scanResultData.item) {
                    updateStock(scanResultData.item.id, scanResultData.item.stock || 0, -Math.abs(totalToConsume), scanResultData.item.name);
                    setScanResultData(null);
                }
            };

            const handleScanInfo = () => {
                if (scanResultData && scanResultData.item) {
                    setViewingInfoItem(scanResultData.item);
                    setScanResultData(null);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-6">
                    <div className="glass-panel p-3 md:p-4 rounded-xl flex flex-col md:flex-row justify-between items-center mb-6 sticky top-2 z-50 gap-4 shadow-2xl no-print">
                        <div className="flex items-center gap-3 w-full md:w-auto">
                            <div className="p-2 md:p-3 bg-gradient-to-br from-amber-500 to-orange-600 rounded-xl shadow-lg"><Icon name="wine" className="text-white" size={20} /></div>
                            <h1 className="text-lg md:text-xl font-bold flex items-center gap-2 text-white">BAR MANAGER
                                {status === 'synced' && <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]" title="Online Synced"></span>}
                                {status === 'connecting' && <span className="w-2 h-2 bg-yellow-500 rounded-full animate-pulse" title="Verbinde..."></span>}
                                {status === 'offline_data' && <span className="w-2 h-2 bg-blue-500 rounded-full" title="Offline Mode (Lokale Daten)"></span>}
                                {status === 'offline_pending' && <span className="w-2 h-2 bg-purple-500 rounded-full animate-pulse" title="Offline Änderungen warten auf Sync..."></span>}
                            </h1>
                        </div>
                        <div className="flex bg-slate-900/50 p-1.5 rounded-xl w-full md:w-auto overflow-x-auto">
                            {['inventory', 'dashboard', 'shopping', 'logs', 'settings'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-all ${activeTab === tab ? 'bg-slate-700 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>
                                    <Icon name={tab === 'inventory' ? 'list' : tab === 'dashboard' ? 'layout-dashboard' : tab === 'shopping' ? 'shopping-cart' : tab === 'logs' ? 'history' : 'settings'} size={16} />
                                    <span className="capitalize hidden md:inline">{tab === 'inventory' ? 'Lager' : tab === 'dashboard' ? 'Cockpit' : tab === 'shopping' ? 'Einkauf' : tab === 'logs' ? 'Protokoll' : 'Einstellung'}</span>
                                    {tab === 'shopping' && (stats.lowStockItems.length + extraOrders.length) > 0 && <span className="bg-red-500 text-white text-[10px] px-1.5 rounded-full">{stats.lowStockItems.length + extraOrders.length}</span>}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main>
                        {activeTab === 'inventory' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="flex gap-2 w-full">
                                    <div className="relative flex-grow">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><Icon name="search" size={20} /></div>
                                        <input className="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:ring-2 focus:ring-amber-500 outline-none" 
                                            placeholder="Suche..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                    </div>
                                    <button onClick={() => setFilterOpen(true)} className={`bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white px-4 rounded-xl flex items-center justify-center transition-all ${filters.supplier || filters.barcode !== 'all' || filters.info !== 'all' || filters.sort !== 'name_asc' ? 'border-amber-500 text-amber-500' : ''}`}><Icon name="filter" size={24} /></button>
                                    <button onClick={() => openScanner('search')} className="bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white px-4 rounded-xl flex items-center justify-center transition-all"><Icon name="scan-barcode" size={24} /></button>
                                    <button onClick={openAddModal} className="bg-amber-500 hover:bg-amber-400 text-slate-900 px-5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-amber-900/20 transition-all active:scale-95 whitespace-nowrap"><Icon name="plus" size={20} /> <span className="inline">Neu</span></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                    {filtered.slice(0, visibleItems).map(item => <ItemCard key={item.id} item={item} onUpd={updateStock} onDel={deleteItem} onEdit={openEditModal} onInfo={(item) => setViewingInfoItem(item)} consumptionAvg={consumptionStats.perArticle[item.name]?.avgPerMonth} />)}
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && <DashboardContent stats={stats} vatRate={vatRate} setVatRate={setVatRate} consumptionStats={consumptionStats} consumptionPeriod={consumptionPeriod} setConsumptionPeriod={setConsumptionPeriod} consumptionLoading={consumptionLoading} />}
                        
                        {activeTab === 'shopping' && (
                            <ShoppingContent 
                                stats={stats} 
                                extraOrders={extraOrders}
                                selectedOrderItems={selectedOrderItems} 
                                orderQuantities={orderQuantities} 
                                toggleOrderItem={toggleOrderItem} 
                                updateOrderQuantity={updateOrderQuantity} 
                                selectAllOrders={selectAllOrders} 
                                processOrder={processOrder}
                                deleteManualOrder={deleteManualOrder}
                                openManualOrderModal={() => setManualOrderModalOpen(true)}
                            />
                        )}
                        
                        {activeTab === 'logs' && <LogsContent logs={logs} onFetchPeriod={fetchLogsForPeriod} />}
                        {activeTab === 'settings' && <SettingsContent categories={categories} suppliers={suppliers} addCategory={addCategory} deleteCategory={deleteCategory} addSupplier={addSupplier} deleteSupplier={deleteSupplier} resetCategories={resetCategories} exportCSV={exportCSV} />}
                    </main>

                    {modalOpen && <ItemModal isOpen={modalOpen} onClose={() => setModalOpen(false)} onSave={saveItem} categories={categories} suppliers={suppliers} initialData={editingItem} scannedCode={activeScanResult} onScanRequest={(field) => openScanner(`edit_${field}`)} />}
                    {scannerOpen && <ScannerModal onClose={() => setScannerOpen(false)} onScan={handleScan} />}
                    {manualOrderModalOpen && <ManualOrderModal isOpen={manualOrderModalOpen} onClose={() => setManualOrderModalOpen(false)} onSave={addManualOrder} inventory={inventory} />}
                    {viewingInfoItem && <InfoModal isOpen={!!viewingInfoItem} onClose={() => setViewingInfoItem(null)} item={viewingInfoItem} />}
                    {scanResultData && <ScanResultModal data={scanResultData} onClose={() => setScanResultData(null)} onConsume={handleScanConsume} onInfo={handleScanInfo} />}
                    {filterOpen && <FilterModal isOpen={filterOpen} onClose={() => setFilterOpen(false)} filters={filters} setFilters={setFilters} suppliers={suppliers} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        const startReact = () => root.render(<App />);

        if (window.fb) {
            startReact();
        } else {
            window.addEventListener('firebase-ready', startReact);
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Service Worker registriert: ', reg);
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed') {
                                if (navigator.serviceWorker.controller) {
                                    console.log('Neue Version verfügbar. Bitte neu laden.');
                                }
                            }
                        };
                    };
                }).catch(err => console.log('Service Worker Fehler: ', err));
            });
        }
    </script>
</body>
</html>
